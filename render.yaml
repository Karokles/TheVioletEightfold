services:
  - type: web
    name: violet-eightfold-backend
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: APP_ENV
        sync: false
        # Stage service: staging
        # Production service later: production
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER_ENABLED
        sync: false
        # Stage with live AI: true
      - key: DATABASE_ENABLED
        sync: false
        # Stage/production with Supabase: true
      - key: PAYMENT_ENABLED
        value: false
        # Keep false until Stripe is implemented.
      - key: SUPABASE_AUTH_ENABLED
        sync: false
        # Stage/production real users: true
      - key: AUTH_STRICT_MODE
        value: true
      - key: USAGE_LIMITS_ENABLED
        sync: false
        # Stage/production first-user testing: true
      - key: LOCAL_AUTH_ENABLED
        value: false
      - key: PORT
        fromService:
          type: web
          name: violet-eightfold-backend
          property: port
      - key: JWT_SECRET
        sync: false
        # Generate with: openssl rand -base64 32
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
        # Stage: https://the-violet-eightfold-git-staging-the-violet-eightfolds-projects.vercel.app
        # Production: https://the-violet-eightfold-git-main-the-violet-eightfolds-projects.vercel.app
      - key: SUPABASE_URL
        sync: false
        # Required for staging/production Supabase Auth and persistence.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        # Required on backend only. Never expose this in Vercel.
      - key: FREE_COUNCIL_SESSIONS
        value: 1
      - key: FREE_COUNCIL_REPLIES_PER_SESSION
        value: 3
      - key: FREE_SINGLE_VOICE_REPLIES
        value: 3
      - key: FREE_BLUEPRINT_SAVES
        value: 1
      - key: FREE_CYCLE_DAYS
        value: 5
      - key: BETA_ACCESS_DAYS
        value: 14
    healthCheckPath: /api/health
    plan: starter
